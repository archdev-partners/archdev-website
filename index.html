<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchDev Partners LLC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 1.25rem;
            color: #a0aec0;
            margin-bottom: 2rem;
        }
        .contact {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #2d3748;
        }
        .contact a {
            color: #63b3ed;
            text-decoration: none;
        }
        .contact a:hover {
            text-decoration: underline;
        }
        .logo {
            width: 80px;
            height: auto;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="logo" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 95
                     Q15 70 25 50
                     Q35 30 45 25
                     Q55 20 60 20
                     Q65 20 75 25
                     Q85 30 95 50
                     Q105 70 100 95
                     L90 95
                     Q92 75 85 58
                     Q78 42 60 38
                     Q42 42 35 58
                     Q28 75 30 95
                     Z"
                  fill="#ed8936"/>
        </svg>
        <h1>ArchDev Partners</h1>
        <p class="tagline">Software architecture and development consulting</p>
        <div class="contact">
            <p><a href="mailto:info@archdev.pro">info@archdev.pro</a></p>
        </div>
    </div>
</body>
</html>
